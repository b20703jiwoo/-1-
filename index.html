<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음 은하계 (Mind Galaxy) - 퀘스트 미니게임 수정 버전</title>
    <style>
        /* 🎨 기본 스타일 및 은하수 배경 */
        body {
            margin: 0; background-color: #0b0b16; color: #ffffff;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; overflow-x: hidden;
            background: radial-gradient(circle at center, #1a103c 0%, #070412 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(white 1px, transparent 0), radial-gradient(rgba(255,255,255,0.4) 2px, transparent 0);
            background-size: 550px 550px, 350px 350px; background-position: 0 0, 40px 60px;
            animation: bgMove 100s linear infinite; opacity: 0.5; z-index: 1;
        }
        @keyframes bgMove { from { background-position: 0 0; } to { background-position: 550px 1100px; } }

        /* 📱 UI 윈도우 레이아웃 및 애니메이션 효과 */
        .window {
            display: none; position: relative; z-index: 10;
            background: rgba(15, 15, 35, 0.8); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15); padding: 30px 20px;
            border-radius: 24px; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            width: 100%; max-width: 500px; box-sizing: border-box;
            max-height: 85vh; overflow-y: auto; text-align: center;
        }
        .window.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .window::-webkit-scrollbar { width: 6px; }
        .window::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }

        h1, h2, h3 { margin-top: 0; text-shadow: 0 0 15px rgba(0, 255, 204, 0.5); }
        .title-glow { font-size: 2.3rem; color: #00ffcc; }
        .subtitle { color: #aaaacb; font-size: 0.9rem; margin-bottom: 25px; line-height: 1.5; }

        /* 버튼 및 대시보드 조작계 */
        .btn {
            background: linear-gradient(45deg, #a29bfe, #00cec9); color: white; border: none;
            padding: 12px 24px; font-weight: bold; border-radius: 30px; cursor: pointer;
            transition: 0.3s ease; margin: 8px 4px; font-size: 0.95rem;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,206,201,0.4); }
        .btn.outline { background: transparent; border: 2px solid #00cec9; color: #00cec9; }
        .btn-danger { background: #ff7675; }
        .btn-small { background: #00cec9; color: white; border: none; padding: 10px 14px; border-radius: 8px; cursor: pointer; white-space: nowrap; }

        input {
            width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4);
            color: white; box-sizing: border-box; font-size: 1rem;
        }
        input:focus { outline: none; border-color: #00ffcc; }
